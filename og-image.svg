<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="60%" style="stop-color:#0f1520"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>

    <!-- Red accent gradient -->
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8000f"/>
      <stop offset="100%" style="stop-color:#ff1a2e"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle glow -->
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Red glow orb top-right -->
  <ellipse cx="1050" cy="80" rx="200" ry="120" fill="rgba(200,0,15,0.12)"/>

  <!-- Red glow orb bottom-left -->
  <ellipse cx="150" cy="550" rx="180" ry="100" fill="rgba(200,0,15,0.08)"/>

  <!-- Top red bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#red)"/>

  <!-- Left accent line -->
  <rect x="80" y="60" width="3" height="510" fill="url(#red)" opacity="0.6"/>

  <!-- Decorative dots -->
  <circle cx="83" cy="60" r="5" fill="#c8000f"/>
  <circle cx="83" cy="570" r="5" fill="#c8000f"/>

  <!-- Main content area -->
  <!-- Breaking label -->
  <rect x="110" y="80" width="130" height="28" rx="4" fill="url(#red)"/>
  <text x="175" y="99" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">⚡ BREAKING</text>

  <!-- Main logo - নজরুল -->
  <text x="110" y="220" font-family="'Noto Serif Bengali', 'Tiro Bangla', serif" font-size="108" font-weight="900" fill="white" filter="url(#shadow)">নজরুল</text>

  <!-- বার্তা in red italic -->
  <text x="110" y="330" font-family="'Noto Serif Bengali', 'Tiro Bangla', serif" font-size="108" font-weight="900" fill="url(#red)" font-style="italic" filter="url(#glow)">বার্তা</text>

  <!-- Horizontal divider line -->
  <rect x="110" y="360" width="580" height="2" fill="rgba(255,255,255,0.1)"/>

  <!-- Tagline -->
  <text x="110" y="400" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" letter-spacing="4" text-transform="uppercase">স্বাধীন · বিশ্বাসযোগ্য · নিরপেক্ষ</text>

  <!-- University name -->
  <text x="110" y="435" font-family="'Noto Serif Bengali', 'Hind Siliguri', sans-serif" font-size="16" fill="rgba(255,255,255,0.35)" letter-spacing="1">জাতীয় কবি কাজী নজরুল ইসলাম বিশ্ববিদ্যালয়</text>

  <!-- URL badge -->
  <rect x="110" y="470" width="310" height="36" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="265" y="493" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">jkkniunews.github.io</text>

  <!-- Right side decorative element -->
  <!-- Big circle outline -->
  <circle cx="960" cy="315" r="220" fill="none" stroke="rgba(200,0,15,0.08)" stroke-width="1"/>
  <circle cx="960" cy="315" r="180" fill="none" stroke="rgba(200,0,15,0.06)" stroke-width="1"/>
  <circle cx="960" cy="315" r="140" fill="none" stroke="rgba(200,0,15,0.12)" stroke-width="2"/>

  <!-- Newspaper icon in circle -->
  <text x="960" y="280" font-size="80" text-anchor="middle" fill="rgba(255,255,255,0.06)">📰</text>

  <!-- NB monogram -->
  <text x="960" y="350" font-family="'Playfair Display', Georgia, serif" font-size="120" font-weight="900" fill="rgba(200,0,15,0.15)" text-anchor="middle">NB</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="110" y="540" width="120" height="60" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="170" y="565" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#c8000f" text-anchor="middle">২৪/৭</text>
  <text x="170" y="585" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">লাইভ</text>

  <!-- Stat 2 -->
  <rect x="245" y="540" width="120" height="60" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="305" y="565" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#c8000f" text-anchor="middle">১০ক+</text>
  <text x="305" y="585" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">পাঠক</text>

  <!-- Stat 3 -->
  <rect x="380" y="540" width="120" height="60" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="440" y="565" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#c8000f" text-anchor="middle">২০২৬</text>
  <text x="440" y="585" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">প্রতিষ্ঠিত</text>

  <!-- Bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#red)" opacity="0.5"/>
</svg>
